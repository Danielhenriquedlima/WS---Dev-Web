<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Clube de Leitura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<header>
    <h1>📚 Clube de Leitura</h1>
    <p>Compartilhe experiências e descubra novos livros.</p>
</header>
 
<nav>
    <a href="#">Início</a>
    <a href="#">Livros</a>
    <a href="#">Autores</a>
    <a href="#">Contato</a>
</nav>
 
<section>
    <h2>Cadastro</h2>
 
    <form>
        <label>Nome:</label>
        <input type="text">
 
        <label>E-mail:</label>
        <input type="email">
 
        <label>Cidade:</label>
        <input type="text">
 
        <label>
            <input type="checkbox">
            Receber novidades
        </label>
 
        <input type="text" value="Campo desabilitado" disabled>
 
        <button>Cadastrar</button>
    </form>
</section>
 
<section>
    <h2>Livros Recomendados</h2>
 
    <ul>
        <li>Dom Casmurro</li>
        <li>1984</li>
        <li class="especial">Harry Potter</li>
        <li>O Hobbit</li>
        <li>O Pequeno Príncipe</li>
    </ul>
</section>
 
</body>
</html>
