<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 12</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="formulario">
        <h2>Cadastro de Produtos</h2>

        <label for="name">Nome do produto</label>
        <input type="text" id="name" name="name" required placeholder="Digite o nome do produto">

        <label for="price">Preço</label>
        <input type="number" id="price" name="price" required placeholder="Digite o preço do produto">

        <label for="quantidade">Quantidade em estoque</label>
        <input type="number" id="quantidade" name="quantidade" required placeholder="Digite a quantidade em estoque">

        <label for="categoria">Categoria</label>
        <select id="categoria" name="categoria" required>
            <option value="">Selecione uma categoria</option>
            <option value="eletronicos">Eletrônicos</option>
            <option value="roupas">Roupas</option>
            <option value="alimentos">Alimentos</option>
            <option value="outros">Outros</option>
        </select>

        <label>Cor do produto</label>
        <input type="color">

        <label>Imagem do produto</label>
        <input type="file">

        <div class="botoes">
            <button type="submit">Cadastrar</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
</body>
</html>
