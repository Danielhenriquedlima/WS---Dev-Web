<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 7</title>
    <link rel="stylesheet" href="style.css">
<body>
    <form action="/" method="post" enctype="multipart/form-data">

        <label for="arquivo">Selecione um arquivo:</label><br>
        <input type="file" id="arquivo" name="arquivo"><br><br>

        <label for="imagem">Selecione uma imagem:</label><br>
        <input type="file" id="imagem" name="imagem" accept="image/*"><br><br>

        <label for="cor">Escolha sua cor favorita:</label><br>
        <input type="color" id="cor" name="cor"><br><br>

        <input type="submit" value="Enviar">
    </form>

</body>
</html>
