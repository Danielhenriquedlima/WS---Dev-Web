<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="conteiner">
        <h1>Pesquisa de compra</h1>

        <form>
            <label for="quantidade">Quantidade de produtos:</label>
            <input type="number" id="quantidade" name="quantidade" min="1" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" placeholder="(11) 9999-9999">

            <label for="satisfação">Satisfação</label>
            <input type="range" id="satisfação" name="satisfação" min="0" max="10">

            <button type="submit">Enviar</button>
        </form>

    </div>
</body>
</html>
