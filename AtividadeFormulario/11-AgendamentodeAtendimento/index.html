<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade 11</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="formulario">
        <h2>Agendamento</h2>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" required placeholder="Digite seu telefone">

        <label for="data">Data:</label>
        <input type="date" id="data" name="data" required>

        <label for="hora">Hora:</label>
        <input type="time" id="hora" name="hora" required>

        <label for=" tipo de serviço">Tipo de serviço:</label>
        <select id="servico" name="servico" required>
            <option value="">Selecione um serviço</option>
            <option value="corte">Corte de cabelo</option>
            <option value="manicure">Manicure</option>
            <option value="pedicure">Pedicure</option>
            <option value="massagem">Massagem</option>
        </select>

        <label>Prioridade:</label>

        <div class="radio">
                
            <input type="radio" id="alta" name="prioridade" value="alta" required>
            <label for="alta">Alta</label>
    
             <input type="radio" id="media" name="prioridade" value="media">
             <label for="media">Média</label>
    
             <input type="radio" id="baixa" name="prioridade" value="baixa">
            <label for="baixa">Baixa</label>
        </div>

        <label>Observações</label>
        <textarea rows="4"></textarea>

        <div class="botoes">       
            <button type="submit">Agendar</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
</body>
</html>
