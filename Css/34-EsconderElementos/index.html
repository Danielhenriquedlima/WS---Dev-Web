<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de esconder elemntos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formas de esconder elemntos</h1>
    <h2>Display none</h2>
    <div class="exemplos">
        <div class="caixa normal">Caixa</div>
        <div class="caixa display-none">Caixa oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>
    <h2>Visibility hidden</h2>
    <div class="exemplos">
        <div class="caixa normal">Caixa</div>
        <div class="caixa visibility-hidden">Caixa oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>
    <h2>Opacity 0</h2>
    <div class="exemplos">
        <div class="caixa normal">Caixa</div>
        <div class="caixa opacity-zero">Caixa oculta</div>
        <div class="caixa normal">Caixa</div>
    </div>

</body>
</html>
