<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatações</title>
</head>
<body>
    Primeira Linha<br>Segunda Linha
    <strong>Texto em negrito semâtico</strong>
    <b>Texto em negrito sem semâtica</b>

    <em>Texto em italico semâtico</em>
    <i>Texto em italico sem semâtica</i>

    <del>Texto tachado semâtico</del>
    <s>texto tachado sem semâtica</s>

    <u>Texto sublinado</u><br>
    X<sup>2</sup>
    H<sub>2</sub>
    <code>console.log("Hello World!");</code><br>
    <blockquote>Citação em bloco</blockquote><br>
    <q>Citação curta</q><br>
</body>
</html>
